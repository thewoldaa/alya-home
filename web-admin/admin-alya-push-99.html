<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alya Admin - Push Notification</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
    <style>
        :root {
            --bg: #0b0712;
            --card: #161021;
            --pink: #ff6b9d;
            --purple: #b44dff;
            --cyan: #00e5ff;
            --text: #f0e8ff;
            --text-dim: #b0a0c8;
            --accent: linear-gradient(135deg, var(--pink), var(--purple));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 107, 157, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(180, 77, 255, 0.05) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 107, 157, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--accent);
        }

        .project-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0, 229, 255, 0.1);
            color: var(--cyan);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--pink);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea, select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--pink);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(255, 107, 157, 0.1);
        }

        .btn-send {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(255, 107, 157, 0.2);
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 107, 157, 0.3);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-msg {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }

        .status-msg.success {
            display: block;
            background: rgba(0, 230, 118, 0.1);
            color: #00e676;
            border: 1px solid rgba(0, 230, 118, 0.2);
        }

        .status-msg.error {
            display: block;
            background: rgba(255, 82, 82, 0.1);
            color: #ff5252;
            border: 1px solid rgba(255, 82, 82, 0.2);
        }

        .config-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
            text-decoration: underline;
        }

        #config-section {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="project-badge">admin-craftkal</div>
        <h1>Alya Push Panel</h1>
        <p class="subtitle">Kirim pesan langsung ke semua user Alya</p>

        <div class="form-group">
            <label>Judul Notifikasi</label>
            <input type="text" id="title" placeholder="Contoh: Alya Kangen!">
        </div>

        <div class="form-group">
            <label>Isi Pesan</label>
            <textarea id="body" rows="4" placeholder="Tulis sesuatu yang manis untuk user..."></textarea>
        </div>

        <div class="form-group">
            <label>Target</label>
            <select id="target">
                <option value="/topics/all">Semua User (Topic: all)</option>
                <option value="custom">Token Spesifik (Debug)</option>
            </select>
        </div>

        <div id="token-input" class="form-group" style="display: none;">
            <label>Device Token</label>
            <input type="text" id="specific-token" placeholder="Paste FCM Token di sini">
        </div>

        <button class="btn-send" id="send-btn">Kirim Sekarang ✨</button>

        <div id="status" class="status-msg"></div>

        <div class="config-toggle" onclick="toggleConfig()">Hubungkan ke Firebase Server</div>
        
        <div id="config-section">
            <div class="form-group">
                <label>FCM Server Key (Legacy)</label>
                <input type="password" id="server-key" placeholder="AAAA...">
                <p style="font-size: 10px; color: var(--text-dim); margin-top: 5px;">
                    Dapatkan di: Firebase Console -> Project Settings -> Cloud Messaging -> Cloud Messaging API (Legacy).
                </p>
            </div>
            <p style="font-size: 10px; color: var(--warn); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 8px;">
                <strong>INFO:</strong> Pastikan API Key ini benar agar Alya bisa bicara langsung ke HP user.
            </p>
        </div>
    </div>

    <script>
        const targetSelect = document.getElementById('target');
        const tokenInput = document.getElementById('token-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const serverKeyInput = document.getElementById('server-key');

        // Load saved key
        serverKeyInput.value = localStorage.getItem('alya_fcm_server_key') || '';

        targetSelect.onchange = () => {
            tokenInput.style.display = targetSelect.value === 'custom' ? 'block' : 'none';
        };

        function toggleConfig() {
            const section = document.getElementById('config-section');
            section.style.display = section.style.display === 'block' ? 'none' : 'block';
        }

        sendBtn.onclick = async () => {
            const title = document.getElementById('title').value;
            const body = document.getElementById('body').value;
            const serverKey = serverKeyInput.value;
            const target = targetSelect.value === 'custom' 
                ? document.getElementById('specific-token').value 
                : '/topics/all';

            if (!title || !body || !serverKey) {
                showStatus('Lengkapi judul, pesan, dan Server Key di bagian bawah ya!', 'error');
                if (!serverKey) toggleConfig();
                return;
            }

            // Save key for next time
            localStorage.setItem('alya_fcm_server_key', serverKey);

            sendBtn.disabled = true;
            sendBtn.innerText = 'Menghubungkan ke Server Firebase...';
            statusEl.className = 'status-msg';
            statusEl.innerText = '';

            try {
                // Using FCM Legacy API
                const response = await fetch('https://fcm.googleapis.com/fcm/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'key=' + serverKey
                    },
                    body: JSON.stringify({
                        to: target,
                        notification: {
                            title: title,
                            body: body,
                            sound: 'default',
                            click_action: 'FCM_PLUGIN_ACTIVITY',
                            icon: 'fcm_push_icon'
                        },
                        data: {
                            title: title,
                            body: body
                        },
                        priority: 'high'
                    })
                });

                const result = await response.json();
                if (response.ok && result.message_id || result.success) {
                    showStatus('Berhasil Terhubung! Notifikasi meluncur ke semua user 🚀', 'success');
                } else {
                    showStatus('Gagal Terhubung: ' + (result.error || 'API Key salah atau ditolak'), 'error');
                }
            } catch (err) {
                showStatus('Error Koneksi: ' + err.message, 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = 'Kirim Sekarang ✨';
            }
        };

        function showStatus(msg, type) {
            statusEl.innerText = msg;
            statusEl.className = 'status-msg ' + type;
        }
    </script>
</body>
</html>
