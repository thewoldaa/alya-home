name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate App Icons
        run: npx @capacitor/assets generate --iconBackgroundColor '#0f0a1a' --iconBackgroundColorDark '#0f0a1a' --splashBackgroundColor '#0f0a1a' --splashBackgroundColorDark '#0f0a1a' --assetPath src/data/images/alya-cute.png
        continue-on-error: true

      - name: Add Android Platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build APK (Debug)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alya-Chatbot-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
