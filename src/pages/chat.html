<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alya Chatbot</title>
  <meta name="description" content="Alya - chatbot personal dengan persona manis dan rapi">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent !important;
      -webkit-focus-ring-color:transparent !important;
      outline:none !important;
    }
    :root{
      --bg:#030005;
      --bg-surface:#08040d;
      --bg-bubble-alya:rgba(26, 16, 43, 0.8);
      --bg-bubble-user:linear-gradient(135deg, #7c4dff, #b388ff);
      --pink:#ff6b9d;
      --purple:#b44dff;
      --cyan:#00e5ff;
      --text-main:#f8f4ff;
      --text-dim:#b0a4c8;
      --text:#f8f4ff;
      --text2:#c8bcd8;
      --text3:#b0a4c8;
      --bg2:#0c0616;
      --glass-bg:rgba(12, 6, 22, 0.7);
      --border:rgba(255, 107, 157, 0.2);
      --glow:0 0 25px rgba(255, 107, 157, 0.3);
      --radius:24px;
      --r:24px;
      --alya-bg:#1a102b;
      --danger:#ff5b5b;
      --shadow:0 10px 40px rgba(0,0,0,0.5);
    }
    body{
      font-family:'Nunito',sans-serif;
      background:var(--bg);
      color:var(--text-main);
      height:100vh;
      height:100dvh;
      display:flex;
      overflow:hidden;
      background: 
        radial-gradient(circle at 0% 0%, rgba(180, 77, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(255, 107, 157, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.05) 0%, transparent 60%);
      animation:bgPulse 15s ease-in-out infinite;
    }
    @keyframes bgPulse{
      0%,100%{background-position:0% 0%,100% 100%,50% 50%}
      50%{background-position:100% 100%,0% 0%,50% 50%}
    }
    body::after{
      display:none;
    }
    
    .sidebar{
      width:290px;
      background:var(--bg-surface);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-right:1px solid var(--border);
      display:flex;
      flex-direction:column;
      transition:all .4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index:500;
      flex-shrink:0;
      padding-top: env(safe-area-inset-top);
    }
    .sidebar-header{padding:28px 24px;border-bottom:1px solid var(--border)}
    .new-chat-btn{
      background:linear-gradient(135deg,var(--pink),var(--purple));
      color:#fff;
      border:none;
      border-radius:30px;
      padding:14px 24px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      width:100%;
      box-shadow:0 8px 20px rgba(255, 107, 157, 0.3);
      transition:all .3s;
      text-transform:uppercase;
      letter-spacing:1px;
    }
    .new-chat-btn:hover{transform:translateY(-3px);box-shadow:0 12px 25px rgba(255, 107, 157, 0.4)}
    
    .session-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    .session-search{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:15px;padding:12px 16px;color:var(--text);font-size:13px;margin-bottom:8px;width:100%;outline:none;transition:.3s}
    .session-search:focus{border-color:var(--pink);background:rgba(255,255,255,0.08)}
    
    .session-item{
      background:rgba(255,255,255,0.02);
      border:1px solid transparent;
      border-radius:20px;
      padding:16px 20px;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
      transition:all .3s;
    }
    .session-item:hover{background:rgba(255,107,157,0.08);border-color:rgba(255,107,157,0.15);transform:translateX(5px)}
    .session-item.active{
      background:rgba(255,107,157,0.12);
      border-color:var(--pink);
      box-shadow:inset 0 0 15px rgba(255,107,157,0.1);
    }
    
    .main-content{flex:1;display:flex;flex-direction:column;position:relative;background:transparent}
    
    .header{
      background:var(--glass-bg);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:calc(16px + env(safe-area-inset-top)) 24px 16px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      z-index:100;
      box-shadow:0 4px 20px rgba(0, 0, 0, 0.2);
    }
    .header-left{display:flex;align-items:center;gap:18px}
    .menu-toggle{
      display:none;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--border);
      color:var(--pink);
      font-size:24px;
      cursor:pointer;
      width:48px;
      height:48px;
      border-radius:15px;
      align-items:center;
      justify-content:center;
      transition:.3s;
    }
    .menu-toggle:hover{background:rgba(255,107,157,0.15);border-color:var(--pink)}
    .menu-toggle:active{transform:scale(0.9)}
    .avatar{
      width:52px;
      height:52px;
      border-radius:50%;
      padding:2px;
      background:linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow:var(--glow);
    }
    .avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid var(--bg-surface)}
    .header-info h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,#fff,var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .status{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
    .status-dot{width:8px;height:8px;border-radius:50%;background:#00ffa3;box-shadow:0 0 10px #00ffa3}
    
    .model-badge{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      padding:6px 16px;
      border-radius:20px;
      font-size:11px;
      font-weight:800;
      color:var(--pink);
      backdrop-filter:blur(10px);
      cursor:pointer;
    }
    .clear-chat-btn{background:transparent;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:8px;border-radius:8px;transition:.2s}
    .clear-chat-btn:hover{color:var(--danger);background:rgba(255,91,91,0.1)}
    .header-right{display:flex;align-items:center;gap:12px}

    .chat-area{
      flex:1;
      overflow-y:auto;
      padding:24px;
      display:flex;
      flex-direction:column;
      gap:24px;
      scrollbar-width:none;
      scroll-behavior:smooth;
    }
    .chat-area::-webkit-scrollbar{display:none}
    
    .message{display:flex;gap:14px;max-width:85%;animation:fadeInUp 0.4s ease-out;width:fit-content}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
    
    .message.user{align-self:flex-end;flex-direction:row-reverse}
    .message.alya{align-self:flex-start}
    
    .msg-avatar{
      width:38px;
      height:38px;
      border-radius:50%;
      flex-shrink:0;
      border:1px solid var(--border);
      overflow:hidden;
    }
    .message.user .msg-avatar{background:var(--bg-bubble-user);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
    
    .message-content{
      padding:14px 20px;
      border-radius:22px;
      font-size:15px;
      line-height:1.5;
      box-shadow:0 4px 15px rgba(0,0,0,0.2);
      position:relative;
    }
    .message.alya .message-content{
      background:var(--bg-bubble-alya);
      border:1px solid var(--border);
      color:var(--text-main);
      border-top-left-radius:4px;
    }
    .message.user .message-content{
      background:var(--bg-bubble-user);
      color:#fff;
      border-top-right-radius:4px;
      box-shadow:0 6px 15px rgba(124, 77, 255, 0.2);
    }
    .message-time{font-size:10px;color:var(--text3);margin-top:6px;opacity:.7}
    .message.user .message-time{text-align:right;margin-right:4px}
    .message.alya .message-time{margin-left:4px}
    
    .input-area{
      background:var(--glass-bg);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      padding:16px 20px calc(16px + env(safe-area-inset-bottom)) 20px;
      border-top:1px solid var(--border);
      display:flex;
      gap:14px;
      align-items:center;
      z-index:100;
    }
    .input-container{
      flex:1;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--border);
      border-radius:30px;
      padding:4px 22px;
      display:flex;
      align-items:center;
      transition:.3s;
    }
    .input-container:focus-within{
      border-color:var(--pink);
      background:rgba(255,255,255,0.08);
      box-shadow:0 0 20px rgba(255,107,157,0.15);
    }
    #chat-input{
      flex:1;
      background:transparent;
      border:none;
      color:#fff;
      padding:12px 0;
      font-size:15px;
      outline:none;
    }
    
    #send-btn{
      width:48px;
      height:48px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--pink),var(--purple));
      border:none;
      color:#fff;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all .3s;
      box-shadow:0 4px 15px rgba(255, 107, 157, 0.3);
    }
    #send-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(255, 107, 157, 0.4)}

    @media(max-width:768px){
      .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);z-index:500;width:85%;max-width:320px;box-shadow:20px 0 60px rgba(0,0,0,0.8)}
      .sidebar.open{transform:translateX(0)}
      .overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:450}
      .menu-toggle{display:flex}
      .main-content{width:100%}
    }

    /* Tablet Landscape & Large Screens */
    @media(min-width:769px) and (max-width:1199px){
      .sidebar{width:270px}
      .message{max-width:90%}
    }

    /* Mobile Landscape Fixes */
    @media(max-height:500px) and (orientation:landscape){
      .header{padding:10px 20px}
      .header-info h1{font-size:18px}
      .avatar{width:42px;height:42px}
      .input-area{padding:10px 20px}
      .chat-area{padding:16px;gap:16px}
      .welcome{padding:15px}
      .welcome-img{width:80px;height:80px}
      .welcome h2{font-size:18px}
      #send-btn, .mic-btn, .emoji-btn {width:42px;height:42px;font-size:18px}
      #chat-input{padding:10px 14px}
    }

    /* Tablet/Desktop Message Widths */
    @media(min-width:1200px){
      .message{max-width:75%}
      .sidebar{width:300px}
    }

    .message-content p{margin-bottom:10px}
    .message-content p:last-child{margin-bottom:0}
    .tts-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text3);border-radius:8px;padding:4px 8px;cursor:pointer;margin-top:8px;font-size:11px;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
    .tts-btn:hover{color:var(--pink);background:rgba(255,107,157,0.1);border-color:var(--pink)}
    .tts-btn.speaking{color:var(--pink);animation:pulse 1s infinite;border-color:var(--pink)}
    .mic-btn{background:rgba(255,255,255,0.05);border:1px solid var(--glass-b);color:var(--text2);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;flex-shrink:0}
    .mic-btn:hover{background:rgba(255,107,157,0.1);color:var(--pink);border-color:var(--pink)}
    .mic-btn.recording{color:var(--pink);background:rgba(255,107,157,0.15);animation:pulse 1s infinite;border-color:var(--pink)}
    .emoji-btn{background:rgba(255,255,255,0.05);border:1px solid var(--glass-b);color:var(--text2);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;flex-shrink:0;font-size:18px}
    .emoji-btn:hover{background:rgba(255,107,157,0.1);color:var(--pink);border-color:var(--pink)}
    .emoji-picker{position:fixed;bottom:80px;left:20px;background:rgba(26,16,40,.98);border:1px solid var(--glass-b);border-radius:16px;padding:12px;display:none;grid-template-columns:repeat(6,1fr);gap:8px;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:280px}
    .emoji-picker.show{display:grid}
    .emoji-picker button{background:transparent;border:none;font-size:22px;cursor:pointer;padding:6px;border-radius:8px;transition:.2s}
    .emoji-picker button:hover{background:rgba(255,107,157,0.15);transform:scale(1.2)}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255, 107, 157, 0.4)}70%{box-shadow:0 0 0 10px rgba(255, 107, 157, 0)}100%{box-shadow:0 0 0 0 rgba(255, 107, 157, 0)}}
    .typing-cursor{display:inline-block;width:3px;height:15px;background:var(--pink);margin-left:4px;animation:blink 1s infinite;vertical-align:middle}
    .typing-indicator{display:none;align-self:flex-start;padding:12px 18px;background:var(--alya-bg);border:1px solid var(--glass-b);border-radius:var(--r);border-bottom-left-radius:4px}
    .typing-indicator.show{display:flex;gap:5px;animation:fadeIn .3s}
    .typing-indicator span{width:8px;height:8px;border-radius:50%;background:var(--pink);animation:bounce 1.4s infinite ease-in-out;opacity:0.6}
    .typing-indicator span:nth-child(2){animation-delay:.2s}
    .typing-indicator span:nth-child(3){animation-delay:.4s}

    .welcome{text-align:center;padding:40px 20px;margin:auto;max-width:400px;animation:fadeIn 0.8s ease-out}
    .welcome-img{width:140px;height:140px;border-radius:50%;overflow:hidden;margin:0 auto 20px;box-shadow:var(--glow);border:3px solid var(--pink);background:var(--bg-surface)}
    .welcome-img img{width:100%;height:100%;object-fit:cover}
    .welcome h2{font-size:24px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .welcome p{color:var(--text2);font-size:15px;line-height:1.6}

    .overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:450;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
    
    .offline-banner{display:none;position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);background:rgba(255,107,157,0.95);color:#fff;text-align:center;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:700;z-index:600;backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,0.3)}
    .offline-banner.show{display:block;animation:slideDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28)}
    @keyframes slideDown{from{transform:translate(-50%, -100%)}to{transform:translate(-50%, 0)}}

    .toast-menu{display:none;position:fixed;background:rgba(26,16,40,0.98);border:1px solid var(--border);border-radius:18px;padding:8px;z-index:2000;box-shadow:var(--shadow);backdrop-filter:blur(20px)}
    .toast-menu.show{display:block}
    .toast-menu button{display:block;width:100%;background:transparent;border:none;color:var(--text);padding:14px 24px;font-size:14px;text-align:left;cursor:pointer;border-radius:12px;font-family:inherit;transition:.2s}
    .toast-menu button:hover{background:rgba(255,107,157,0.15);color:var(--pink)}

    .pull-indicator{position:absolute;top:-50px;left:50%;transform:translateX(-50%);color:var(--pink);font-size:14px;transition:.3s;opacity:0}
    .pull-indicator.show{opacity:1;top:20px}
    
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="createNewSession()">+ Chat Baru</button>
      <input type="text" class="session-search" id="session-search" placeholder="Cari chat...">
    </div>
    <div class="session-list" id="session-list"></div>
    <div class="sidebar-footer">
      <a href="settings.html" class="settings-btn">Settings & Memory</a>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <div class="offline-banner" id="offline-banner">Tidak ada internet. Alya wait dulu ya.</div>
  <div class="toast-menu" id="toast-menu"></div>
  <div class="emoji-picker" id="emoji-picker"></div>

  <main class="main-content">
    <header class="header">
      <div class="header-left">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="avatar">
          <img src="../data/images/alya-cute.png" alt="Alya">
        </div>
        <div class="header-info">
          <h1>Alya</h1>
          <div class="status">
            <div class="status-dot"></div>
            <span>Online</span>
          </div>
        </div>
      </div>
      <div class="header-right">
        <div class="model-badge" id="model-badge">Model aktif</div>
        <button class="clear-chat-btn" id="clear-chat-btn" title="Hapus chat ini">🗑</button>
      </div>
    </header>

    <div class="chat-area" id="chat-area">
      <div class="welcome" id="welcome-screen">
        <div class="welcome-img">
          <img src="../data/images/alya-happy.png" alt="Alya">
        </div>
        <h2>Halo, Kakak! ✨</h2>
        <p>Alya siap nemenin ngobrol. Kakak mau bahas apa hari ini? Alya bakal dengerin kok!</p>
      </div>
      <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>
    </div>

    <footer class="input-area">
      <button id="mic-btn" class="mic-btn" title="Bicara">🎤</button>
      <button id="emoji-btn" class="emoji-btn" title="Emoji">😊</button>
      <div class="input-container">
        <input type="text" id="chat-input" placeholder="Tulis pesan..." autocomplete="off">
      </div>
      <button id="send-btn" title="Kirim">🚀</button>
    </footer>
  </main>

  <script type="module">
    import { SessionManager } from '../engine/SessionManager.js';
    import { GeminiEngine } from '../engine/GeminiEngine.js';
    import { NotificationManager } from '../engine/NotificationManager.js';

    // Global error handler to prevent WebView crash
    window.onerror = function(msg, url, line, col, error) {
      console.error('Global Error:', msg, url, line, col, error);
      return true; // Prevent default handling
    };
    window.addEventListener('unhandledrejection', (e) => {
      console.error('Unhandled Promise:', e.reason);
      e.preventDefault();
    });

    let sessionManager, geminiEngine, notificationManager;
    try {
      sessionManager = new SessionManager();
    } catch(e) {
      console.error('SessionManager init failed:', e);
      sessionManager = null;
    }
    try {
      geminiEngine = new GeminiEngine();
    } catch(e) {
      console.error('GeminiEngine init failed:', e);
      geminiEngine = null;
    }
    try {
      notificationManager = new NotificationManager();
    } catch(e) {
      console.error('NotificationManager init failed:', e);
      notificationManager = null;
    }

    // Intercept Android hardware back button - minimize app instead of crashing
    try {
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
        window.Capacitor.Plugins.App.addListener('backButton', ({canGoBack}) => {
          if (canGoBack) {
            window.history.back();
          } else {
            // Minimize the app instead of closing/crashing
            window.Capacitor.Plugins.App.minimizeApp();
          }
        });
      }
    } catch(e) {
      console.warn('Capacitor App plugin not available:', e);
    }

    // Prevent browser back from going to index.html redirect loop
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', () => {
      history.pushState(null, '', location.href);
    });

    const chatArea = document.getElementById('chat-area');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const typing = document.getElementById('typing');
    const welcomeScreen = document.getElementById('welcome-screen');
    const sessionListEl = document.getElementById('session-list');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const modelBadge = document.getElementById('model-badge');
    const micBtn = document.getElementById('mic-btn');
    const emojiBtn = document.getElementById('emoji-btn');
    const emojiPicker = document.getElementById('emoji-picker');
    const offlineBanner = document.getElementById('offline-banner');
    const toastMenu = document.getElementById('toast-menu');
    const clearChatBtn = document.getElementById('clear-chat-btn');

    const ttsTextMap = new WeakMap();
    
    // Quick emoji picker
    const quickEmojis = ['😊', '😂', '😍', '🥰', '😢', '😡', '🤔', '😴', '🤯', '🥳', '😎', '🤩', '✨', '🔥', '💕', '❤️', '😘', '💖', '🎉', '👍', '🙏', '💯'];
    if (emojiPicker) {
      emojiPicker.innerHTML = quickEmojis.map(e => `<button>${e}</button>`).join('');
      emojiPicker.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          chatInput.value += btn.textContent;
          chatInput.focus();
          emojiPicker.classList.remove('show');
        });
      });
    }

    // Attach to window explicitly to ensure global availability
    window.toggleSidebar = function() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      if (!sidebar || !overlay) return;
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
      window.haptic('light');
    };

    window.createNewSession = function() {
      sessionManager.createNewSession();
      renderSessionList();
      loadCurrentSession();
      if (window.innerWidth <= 768) toggleSidebar();
    };

    window.switchSession = function(id) {
      sessionManager.switchSession(id);
      renderSessionList();
      loadCurrentSession();
      if (window.innerWidth <= 768) toggleSidebar();
    };

    window.deleteSession = function(event, id) {
      event.stopPropagation();
      if (confirm('Hapus chat ini?')) {
        sessionManager.deleteSession(id);
        renderSessionList();
        loadCurrentSession();
      }
    };

    function refreshModelBadge() {
      const modelInfo = geminiEngine.getSelectedModelInfo();
      modelBadge.textContent = modelInfo?.label || 'Model aktif';
      modelBadge.classList.toggle('warn', modelInfo?.mode !== 'chat');
      modelBadge.title = modelInfo?.note || '';
    }

    function renderSessionList() {
      const searchTerm = (document.getElementById('session-search')?.value || '').toLowerCase();
      const filteredSessions = searchTerm 
        ? sessionManager.sessions.filter(s => s.title.toLowerCase().includes(searchTerm))
        : sessionManager.sessions;
      
      sessionListEl.innerHTML = '';
      filteredSessions.forEach((session) => {
        const div = document.createElement('div');
        div.className = `session-item ${session.id === sessionManager.currentSessionId ? 'active' : ''}`;
        div.onclick = () => switchSession(session.id);
        div.innerHTML = `
          <div class="session-title">${escapeHtml(session.title)}</div>
          <button class="delete-session" onclick="deleteSession(event, '${session.id}')">🗑</button>
        `;
        sessionListEl.appendChild(div);
      });
    }

    function loadCurrentSession() {
      Array.from(chatArea.children).forEach((child) => {
        if (child !== welcomeScreen && child !== typing) {
          child.remove();
        }
      });

      const messages = sessionManager.getCurrentMessages();
      if (messages.length === 0) {
        welcomeScreen.style.display = 'block';
      } else {
        welcomeScreen.style.display = 'none';
        messages.forEach((msg) => appendMessageUI(msg.role, msg.text));
      }

      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function formatMessageTime(isoDate) {
      const date = new Date(isoDate);
      const now = new Date();
      const isToday = date.toDateString() === now.toDateString();
      const timeStr = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      if (isToday) return timeStr;
      return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }) + ' ' + timeStr;
    }

    function appendMessageUI(role, text, isTypewriter = false, timestamp = null) {
      const msgTime = timestamp || new Date().toISOString();
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.setAttribute('data-time', msgTime);

      const avatarHtml = role === 'user'
        ? '<div class="msg-avatar">K</div>'
        : '<div class="msg-avatar"><img src="../data/images/alya-cute.png" alt="Alya"></div>';

      div.innerHTML = `${avatarHtml}<div><div class="message-content"></div><div class="message-time">${formatMessageTime(msgTime)}</div></div>`;
      const contentContainer = div.querySelector('.message-content');

      chatArea.insertBefore(div, typing);
      chatArea.scrollTop = chatArea.scrollHeight;

      if (role === 'user') {
        contentContainer.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
        return;
      }

      if (isTypewriter) {
        let index = 0;
        contentContainer.innerHTML = '<span class="typing-cursor"></span>';
        const interval = setInterval(() => {
          if (index < text.length) {
            contentContainer.textContent = `${text.substring(0, index + 1)}|`;
            index += 2;
            chatArea.scrollTop = chatArea.scrollHeight;
          } else {
            clearInterval(interval);
            renderAlyaContent(contentContainer, text);
          }
        }, 15);
        return;
      }

      renderAlyaContent(contentContainer, text);
    }

    function renderAlyaContent(container, rawText) {
      let parsedHtml;
      try {
        parsedHtml = typeof marked !== 'undefined'
          ? marked.parse(rawText)
          : escapeHtml(rawText).replace(/\n/g, '<br>');
      } catch (error) {
        parsedHtml = escapeHtml(rawText).replace(/\n/g, '<br>');
      }

      container.innerHTML = parsedHtml;
      const ttsBtn = document.createElement('button');
      ttsBtn.className = 'tts-btn';
      ttsBtn.title = 'Bacakan';
      ttsBtn.textContent = 'Suara';
      ttsTextMap.set(ttsBtn, rawText);
      ttsBtn.addEventListener('click', function() {
        speakText(this);
      });
      container.appendChild(ttsBtn);
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      const apiKey = geminiEngine.getApiKey();
      if (!apiKey) {
        alert('API key belum diatur. Buka Settings dulu ya.');
        window.location.href = 'settings.html';
        return;
      }

      chatInput.value = '';
      welcomeScreen.style.display = 'none';

      sessionManager.addMessage('user', text);
      appendMessageUI('user', text);
      renderSessionList();

      typing.classList.add('show');
      chatArea.scrollTop = chatArea.scrollHeight;

      try {
        const history = sessionManager.getCurrentMessages();
        const responseText = await geminiEngine.generateResponse(history);
        typing.classList.remove('show');
        sessionManager.addMessage('alya', responseText);
        appendMessageUI('alya', responseText, true);
      } catch (error) {
        typing.classList.remove('show');
        const modelInfo = geminiEngine.getSelectedModelInfo();
        const errText = error.message.startsWith('MODEL_MODE_')
          ? `Mode ${modelInfo?.label || 'ini'} belum cocok buat chat biasa, Kakak. Ganti ke model chat dulu di Settings ya.`
          : `Alya lagi kepentok error. Coba cek API key atau model di Settings ya. (${error.message})`;
        console.error(error);
        sessionManager.addMessage('alya', errText);
        appendMessageUI('alya', errText, true);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function speakText(btn) {
      const text = ttsTextMap.get(btn);
      if (!text) return;

      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID';
        utterance.pitch = 1.15;
        utterance.rate = 1.0;
        btn.classList.add('speaking');
        utterance.onend = () => btn.classList.remove('speaking');
        utterance.onerror = () => btn.classList.remove('speaking');
        window.speechSynthesis.speak(utterance);
      } else {
        alert('Text-to-speech tidak didukung di perangkat ini.');
      }
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'id-ID';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = function() {
        micBtn.classList.add('recording');
      };

      recognition.onresult = function(event) {
        chatInput.value = event.results[0][0].transcript;
        micBtn.classList.remove('recording');
        sendMessage();
      };

      recognition.onspeechend = function() {
        recognition.stop();
        micBtn.classList.remove('recording');
      };

      recognition.onerror = function(event) {
        micBtn.classList.remove('recording');
        console.error('Speech error', event.error);
      };

      micBtn.addEventListener('click', () => recognition.start());
    } else {
      micBtn.style.display = 'none';
    }

    sendBtn.addEventListener('click', sendMessage);
    
    // Auto-resize untuk Android (tidak perlu Enter)
    chatInput.setAttribute('inputmode', 'text');
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
    });

    // Mobile Features
    // 1. Keep screen awake during chat
    try {
      if (navigator.wakeLock) {
        let wakeLock = null;
        const requestWakeLock = async () => {
          try {
            wakeLock = await navigator.wakeLock.request('screen');
          } catch(e) {}
        };
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
        });
        if (document.visibilityState === 'visible') requestWakeLock();
      }
    } catch(e) {}

    // 2. Offline indicator
    const updateOnlineStatus = () => {
      if (offlineBanner) {
        offlineBanner.classList.toggle('show', !navigator.onLine);
      }
    };
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // 3. Haptic feedback on buttons
    const haptic = (type = 'light') => {
      try {
        if (navigator.vibrate) {
          navigator.vibrate(type === 'heavy' ? 30 : type === 'medium' ? 15 : 8);
        }
      } catch(e) {}
    };
    window.haptic = haptic;
    sendBtn.addEventListener('click', () => haptic('medium'));
    if (clearChatBtn) {
      clearChatBtn.addEventListener('click', () => {
        if (confirm('Hapus semua chat di sesi ini?')) {
          sessionManager.clearCurrentSession();
          loadCurrentSession();
          window.haptic('medium');
        }
      });
    }
    micBtn.addEventListener('click', () => haptic('light'));
    if (emojiBtn) {
      emojiBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        emojiPicker.classList.toggle('show');
        window.haptic('light');
      });
    }
    document.addEventListener('click', (e) => {
      if (emojiPicker && emojiPicker.classList.contains('show') && !emojiPicker.contains(e.target) && e.target !== emojiBtn) {
        emojiPicker.classList.remove('show');
      }
    });
    document.querySelectorAll('.new-chat-btn, .session-item, .menu-toggle').forEach(el => {
      el.addEventListener('click', () => haptic('light'));
    });

    // 4. Pull-to-refresh simulation
    let pullStartY = 0;
    let pullStartTime = 0;
    chatArea.addEventListener('touchstart', (e) => {
      if (chatArea.scrollTop <= 0) {
        pullStartY = e.touches[0].clientY;
        pullStartTime = Date.now();
      }
    }, { passive: true });
    chatArea.addEventListener('touchmove', (e) => {
      if (pullStartY > 0 && chatArea.scrollTop <= 0) {
        const deltaY = e.touches[0].clientY - pullStartY;
        if (deltaY > 80 && Date.now() - pullStartTime > 500) {
          haptic('medium');
          pullStartY = 0;
        }
      }
    }, { passive: true });
    chatArea.addEventListener('touchend', () => { pullStartY = 0; }, { passive: true });

    // 5. Long-press context menu on messages
    const toastMenu = document.getElementById('toast-menu');
    let longPressTimer = null;
    let activeMessageEl = null;

    const showToastMenu = (x, y, text) => {
      const isUser = x > window.innerWidth / 2;
      toastMenu.innerHTML = `
        <button onclick="copyMessage('${escapeHtml(text).replace(/'/g, "\\'")}');toastMenu.classList.remove('show');window.haptic('light')">Salin</button>
        ${!isUser ? `<button onclick="speakTextFromMenu('${escapeHtml(text).replace(/'/g, "\\'")}');toastMenu.classList.remove('show');window.haptic('light')">Bacakan</button>` : ''}
      `;
      toastMenu.style.left = Math.min(x, window.innerWidth - 100) + 'px';
      toastMenu.style.top = Math.min(y, window.innerHeight - 120) + 'px';
      toastMenu.classList.add('show');
      haptic('medium');
    };

    const hideToastMenu = () => {
      toastMenu.classList.remove('show');
      activeMessageEl = null;
    };

    window.copyMessage = function(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Teks disalin!');
      }).catch(() => {
        alert('Gagal menyalin.');
      });
    };

    window.speakTextFromMenu = function(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID';
        utterance.pitch = 1.15;
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
      }
    };

    document.addEventListener('click', hideToastMenu);
    document.addEventListener('touchstart', () => {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    });
    document.addEventListener('contextmenu', (e) => {
      const msgContent = e.target.closest('.message-content');
      if (msgContent && longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
        e.preventDefault();
        const text = msgContent.textContent.replace('Suara', '').trim();
        showToastMenu(e.clientX, e.clientY, text);
      }
    });
    chatArea.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        const touch = e.touches[0];
        const msgEl = touch.target.closest('.message-content');
        if (msgEl) {
          longPressTimer = setTimeout(() => {
            const text = msgEl.textContent.replace('Suara', '').trim();
            showToastMenu(touch.clientX, touch.clientY, text);
            longPressTimer = null;
          }, 600);
        }
      }
    }, { passive: true });

    refreshModelBadge();
    renderSessionList();
    
    // Session search filter
    const sessionSearch = document.getElementById('session-search');
    if (sessionSearch) {
      sessionSearch.addEventListener('input', renderSessionList);
    }
    
    loadCurrentSession();
    try {
      if (notificationManager) notificationManager.scheduleRandomNotifications();
    } catch(e) {
      console.error('Notification scheduling failed:', e);
    }
  </script>
</body>
</html>
